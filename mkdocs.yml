
site_name: WILD
site_description: Open-source wireless neurotechnology for naturalistic neuroscience
site_url: https://ayalab1.github.io/Neurologger/
repo_url: https://github.com/ayalab1/Neurologger
repo_name: ayalab1/Neurologger
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  icon:
    logo: material/access-point
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.action.edit
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ayalab1/Neurologger
      name: WILD on GitHub

nav:
  - Home: index.md
  - Getting Started:
      - getting-started/index.md
      - Hardware Setup: getting-started/hardware-setup.md
      - Firmware Flashing: getting-started/firmware-flashing.md
      - Data Acquisition: getting-started/data-acquisition.md
      - Data Analysis: getting-started/data-analysis.md
  - Hardware:
      - hardware/index.md
      - Device Overview: hardware/device-overview.md
      - PCB: hardware/pcb.md
      - Mechanical: hardware/mechanical.md
      - Power: hardware/power.md
  - Firmware:
      - firmware/index.md
      - Architecture: firmware/architecture.md
      - Build Instructions: firmware/build-instructions.md
      - BLE: firmware/ble.md
      - DSP: firmware/dsp.md
  - Software:
      - software/index.md
      - Acquisition: software/acquisition.md
      - Live Visualization: software/live-visualization.md
      - Data Format: software/data-format.md
  - Analysis:
      - analysis/index.md
      - Python: analysis/python.md
      - MATLAB: analysis/matlab.md
      - Spike Sorting: analysis/spike-sorting.md
  - Examples: examples/index.md
  - Publications: publications/index.md
  - Contributing: contributing.md
  - FAQ: faq.md

copyright: Copyright &copy; WILD contributors
